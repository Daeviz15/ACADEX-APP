name: acadex
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.2.0
  dio: ^5.5.0
  flutter_secure_storage: ^9.2.2
  flutter_animate: ^4.5.1
  lottie: ^3.3.1
  visibility_detector: ^0.4.0+2
  url_launcher: ^6.2.5
  shared_preferences: ^2.5.4
  custom_refresh_indicator: ^4.0.1
  google_sign_in: ^7.2.0
  flutter_dotenv: ^6.0.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  intl: ^0.19.0
  screen_protector: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - .env
    - assets/icons/
    - assets/lottie/
    - assets/lottie/ai/
    - assets/lottie/dashboard/
    - assets/fonts/
    - assets/fonts/static/
    - assets/fonts/Outfit/static/
    - assets/fonts/Urbanist/static/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/static/Montserrat-Regular.ttf
        - asset: assets/fonts/static/Montserrat-Italic.ttf
          style: italic
        - asset: assets/fonts/static/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/static/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/static/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/static/Montserrat-Black.ttf
          weight: 900

    - family: Urbanist
      fonts:
        - asset: assets/fonts/Urbanist/static/Urbanist-Regular.ttf
        - asset: assets/fonts/Urbanist/static/Urbanist-Italic.ttf
          style: italic
        - asset: assets/fonts/Urbanist/static/Urbanist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Urbanist/static/Urbanist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Urbanist/static/Urbanist-Bold.ttf
          weight: 700
        - asset: assets/fonts/Urbanist/static/Urbanist-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Urbanist/static/Urbanist-Black.ttf
          weight: 900

    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit/static/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit/static/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit/static/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit/static/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit/static/Outfit-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Outfit/static/Outfit-Black.ttf
          weight: 900

    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700

    - family: HostGrotesk
      fonts:
        - asset: assets/fonts/static/HostGrotesk-Regular.ttf
        - asset: assets/fonts/static/HostGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/HostGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/static/HostGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/static/HostGrotesk-ExtraBold.ttf
          weight: 800
